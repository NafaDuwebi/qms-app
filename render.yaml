services:
  - type: web
    name: qms-app
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qms-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://qms-app.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: qms-db
    plan: free
    databaseName: qms_db
